[package]
name = "rvt"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Open reader for Autodesk Revit (.rvt, .rfa, .rte, .rft) files. No Revit installation required."
authors = ["Griffin Radcliffe <DrunkOnJava@users.noreply.github.com>"]
repository = "https://github.com/DrunkOnJava/rvt-rs"
keywords = ["revit", "bim", "cad", "autodesk", "rfa"]
categories = ["parser-implementations", "compression"]

[dependencies]
cfb = "0.11"                          # Microsoft Compound File Binary (OLE)
flate2 = "1.0"                        # DEFLATE / raw inflate
encoding_rs = "0.8"                   # UTF-16LE decode
quick-xml = { version = "0.36", features = ["serialize"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
thiserror = "1"

[[bin]]
name = "rvt-info"
path = "src/bin/rvt_info.rs"

[[bin]]
name = "rvt-diff"
path = "src/bin/rvt_diff.rs"

[lib]
name = "rvt"
path = "src/lib.rs"

[profile.release]
lto = true
codegen-units = 1
strip = true
