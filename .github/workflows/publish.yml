name: Publish (crates.io + PyPI)

# Triggered on tag pushes matching `v*` (e.g. v0.1.2, v0.2.0) and on
# manual `workflow_dispatch`. NOT on every push to main — this is the
# release path, intentionally separate from CI so day-to-day commits
# don't spin up Windows wheel builds for nothing.
#
# Two publish targets (Q-10):
#
#   1. crates.io — the Rust registry. `cargo publish` uses
#      `CARGO_REGISTRY_TOKEN` (repo secret).
#   2. PyPI — the Python package index. Trusted-publisher OIDC
#      (no secret needed after one-time account setup).
#
# Release publication runs only after wheel install, source install,
# CLI sample, viewer load, and docs preview checks pass. Real PyPI
# publication also waits for crates.io publication so the two package
# channels cannot split-brain on a rejected Rust crate.
#
# Uses PyPI's Trusted Publisher feature (OIDC): no PYPI_API_TOKEN
# secret is stored in the repo. PyPI trusts this specific workflow
# (DrunkOnJava/rvt-rs / publish.yml / environment: pypi) to upload
# releases, and rejects any other source.
#
# One-time PyPI setup (Griffin, after creating the project):
#
#   1. Claim the `rvt` project name at https://pypi.org/manage/account/publishing/
#   2. Add a trusted publisher:
#        - PyPI project name: rvt
#        - Owner: DrunkOnJava
#        - Repo: rvt-rs
#        - Workflow file: publish.yml
#        - Environment: pypi
#   3. Optionally add a TestPyPI trusted publisher the same way so
#      `workflow_dispatch -> test-pypi: true` works for dry runs.
#
# Once that's done: `git tag v0.1.2 && git push origin v0.1.2`
# triggers the full wheel build matrix and uploads to PyPI.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      test-pypi:
        description: "Also publish to TestPyPI after release verification"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Build release wheels on every target OS. Mirrors the python-wheel
  # matrix in ci.yml so any regression that would fail a push-CI run
  # also fails here, before we publish.
  build-wheels:
    name: Build wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Disable autocrlf on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: publish-wheel-${{ matrix.os }}

      # abi3-py38 means one wheel per OS/arch covers every Python
      # >= 3.8. No per-Python-minor-version matrix needed.
      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # SEC-12/13: wheel sources now come from the `rvt-py/`
          # workspace member crate. The `--features python` switch
          # is gone because `rvt-py` is a pyo3-only crate with no
          # optional feature gating.
          args: --release --out dist --manifest-path rvt-py/Cargo.toml
          # macos-latest is arm64 by default. If Griffin wants x86_64
          # macs too, add a separate job with `target: x86_64-apple-darwin`.

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  # Source distribution — built once on Linux. PyPI recommends always
  # shipping an sdist alongside wheels so downstream packagers (conda,
  # Debian, nixpkgs) can build from source if needed.
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist via maturin
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # Q-13: smoke-test every built wheel before uploading anywhere.
  # Installs each wheel in a throwaway venv and imports the `rvt`
  # module + instantiates a minimal `RevitFile` object; if any wheel
  # fails to install or the import blows up, the release is aborted
  # before TestPyPI or PyPI sees it. Cheap insurance against a
  # broken release reaching users (TestPyPI round-trip would catch
  # install but not import-time errors).
  validate-wheel-install:
    name: Install + import / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [build-wheels]
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Download wheel for this OS
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: wheel
      - name: Install the wheel in a fresh venv
        shell: bash
        run: |
          python -m venv /tmp/rvt-venv
          # Cross-platform venv activation: source the right shim.
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            source /tmp/rvt-venv/Scripts/activate
          else
            source /tmp/rvt-venv/bin/activate
          fi
          python -m pip install --upgrade pip
          python -m pip install wheel/*.whl
          python -c "import rvt; print('rvt', rvt.__version__ if hasattr(rvt, '__version__') else 'ok')"
          # Minimal smoke: can we create a RevitFile instance from a
          # non-existent path and get a typed error (proves the pyo3
          # bindings loaded)?
          python - <<'EOF'
          import rvt
          try:
              rvt.RevitFile("/definitely/does/not/exist.rvt")
          except (FileNotFoundError, OSError, RuntimeError, Exception) as e:
              print(f"got expected error: {type(e).__name__}")
          EOF

  release-source-smoke:
    name: Cargo install + CLI sample smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch sample corpus
        uses: actions/checkout@v4
        with:
          repository: phi-ag/rvt
          path: _corpus
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: release-source-smoke
      - name: Install crate from release source
        run: cargo install --path . --locked --root /tmp/rvt-release-install
      - name: Run CLIs on sample file
        env:
          RVT_SAMPLE: ${{ github.workspace }}/_corpus/examples/Autodesk/racbasicsamplefamily-2024.rfa
          RVT_BIN: /tmp/rvt-release-install/bin
        run: |
          set -euo pipefail
          "${RVT_BIN}/rvt-inspect" --version
          "${RVT_BIN}/rvt-info" "${RVT_SAMPLE}"
          "${RVT_BIN}/rvt-inspect" "${RVT_SAMPLE}" --json > /tmp/rvt.inspect.json
          "${RVT_BIN}/rvt-ifc" "${RVT_SAMPLE}" \
            -o /tmp/rvt.ifc \
            --diagnostics /tmp/rvt.diagnostics.json
          test -s /tmp/rvt.inspect.json
          test -s /tmp/rvt.ifc
          test -s /tmp/rvt.diagnostics.json

  docs-rs-preview:
    name: docs.rs build preview
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "--cfg docsrs -D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: release-docs
      - name: Build docs with warnings denied
        run: cargo +nightly doc --no-deps --all-features -p rvt

  viewer-release-smoke:
    name: Viewer artifact load smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch sample corpus
        uses: actions/checkout@v4
        with:
          repository: phi-ag/rvt
          path: _corpus
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build WASM package
        run: |
          wasm-pack build --target web -- --features wasm --no-default-features
          rm -rf viewer/pkg
          mv pkg viewer/pkg
      - name: Install viewer dependencies
        working-directory: viewer
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: viewer
        run: npx playwright install --with-deps chromium
      - name: Build viewer
        working-directory: viewer
        run: npm run build
      - name: Verify viewer loads sample without network regressions
        working-directory: viewer
        env:
          RVT_VIEWER_SAMPLE: ../_corpus/examples/Autodesk/racbasicsamplefamily-2024.rfa
        run: npm run test:network

  # Q-10: crates.io publish. Runs BEFORE the PyPI publish so if the
  # crate is rejected (yanked name conflict, verify-failure, etc.)
  # the Python side doesn't ship with a mismatched version. Requires
  # the repo secret `CARGO_REGISTRY_TOKEN` (set once via
  # https://github.com/DrunkOnJava/rvt-rs/settings/secrets/actions).
  # On manual workflow_dispatch, the crates.io step is skipped
  # (there's no TestPyPI equivalent for crates.io — the registry
  # doesn't offer a test/staging environment).
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
      - validate-wheel-install
      - release-source-smoke
      - docs-rs-preview
      - viewer-release-smoke
    # Don't re-publish when the user explicitly asked for TestPyPI-only.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: publish-crate
      # Verify the Cargo.toml version matches the git tag — prevents
      # mismatched publishes where the tag says v0.1.3 but the crate
      # goes out as 0.1.2 (or vice versa). Compare `pkgid` output to
      # the tag, strip the leading "v".
      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          crate_version=$(cargo metadata --no-deps --format-version=1 \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          if [[ "$tag_version" != "$crate_version" ]]; then
            echo "::error::tag v$tag_version does not match Cargo.toml version $crate_version"
            exit 1
          fi
          echo "version match: $tag_version"
      - name: Cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Default features only. `--all-features` would enable
        # `wasm`, which requires wasm-bindgen / serde-wasm-bindgen
        # in a way that shouldn't be forced on `cargo add rvt`
        # users. The pyo3 bindings are in the separate `rvt-py`
        # member crate (SEC-12/13), which has `publish = false`
        # and ships via maturin to PyPI instead.
        run: cargo publish -p rvt

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.test-pypi }}
    needs:
      - build-wheels
      - build-sdist
      - validate-wheel-install
      - release-source-smoke
      - docs-rs-preview
      - viewer-release-smoke
    environment:
      name: testpypi
      url: https://test.pypi.org/p/rvt
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Flatten into dist/
        shell: bash
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec mv {} dist/ \;
          ls -la dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  # Real PyPI releases are tag-only and wait for crates.io publish to
  # succeed first. This prevents a split-brain release where the Python
  # package ships but the matching Rust crate was rejected.
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs:
      - build-wheels
      - build-sdist
      - validate-wheel-install
      - release-source-smoke
      - docs-rs-preview
      - viewer-release-smoke
      - publish-crate
    environment:
      name: pypi
      url: https://pypi.org/p/rvt
    permissions:
      # `id-token: write` is the OIDC token needed for trusted
      # publishing. `contents: read` is the default. No other perms.
      id-token: write
      contents: read
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
      - name: Flatten into dist/
        shell: bash
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) -exec mv {} dist/ \;
          ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` — trusted publisher OIDC is auto-detected
          # when `id-token: write` is set and a trusted publisher
          # configuration exists on PyPI for this workflow.
          skip-existing: false
