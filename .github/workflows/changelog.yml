name: Changelog

# Q-11 / #348 — git-cliff changelog automation.
#
# rvt-rs' CHANGELOG.md is hand-curated with rich narrative per release
# (see the [0.1.0], [0.1.1], [0.1.2] entries — each carries context the
# bare commit subject doesn't). We intentionally do NOT overwrite it
# from `git log` on every push. Instead:
#
#   - main push : write `CHANGELOG-UNRELEASED.md` (unreleased commits
#                 only) and UPLOAD AS ARTIFACT. Release managers
#                 download the artifact and copy-paste the bullets
#                 into CHANGELOG.md when curating a version,
#                 annotating with prose.
#   - tag push  : render the full history via git-cliff and upload as
#                 `RELEASE_NOTES.md` workflow artifact. The release
#                 workflow (Q-10) consumes that file for the GitHub
#                 Release body + PyPI description.
#
# Why we don't push-commit the rendered file back to main: the repo
# enforces branch protection (required status checks + signed
# commits). The github-actions bot can't satisfy either, so any
# attempted push is rejected with GH013. Keeping the artifact as
# download-only sidesteps both. If signed-bot pushes ever get set
# up, we can restore the commit step.
#
# See RELEASE.md for the end-to-end release workflow.
#
# Third-party actions are SHA-pinned per SEC-29 / #134. Official
# actions/* follow the same convention as ci.yml (major-pinned where
# pre-existing, SHA-pinned for recent additions).

on:
  push:
    branches: [main]
    tags: ["v*"]

# Single-flight per ref so back-to-back pushes don't race on the
# CHANGELOG-UNRELEASED.md commit back to main.
concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    # No contents:write needed — we upload artifacts, never push.
    # Default read-only token is sufficient for git-cliff to walk
    # the history.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so git-cliff can walk every tag back to the
          # initial commit. `fetch-depth: 0` is the documented way.
          fetch-depth: 0

      # Unreleased-only render for main pushes. The output file is
      # `CHANGELOG-UNRELEASED.md`, intentionally separate from the
      # hand-curated CHANGELOG.md (see RELEASE.md §Workflow).
      - name: Render unreleased section
        if: github.ref == 'refs/heads/main'
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --unreleased --verbose
        env:
          OUTPUT: CHANGELOG-UNRELEASED.md

      # Upload as artifact instead of committing back to main — branch
      # protection requires (1) 5 status checks to pass and (2) signed
      # commits, neither of which the default github-actions bot can
      # satisfy (see the pre-2026-04-20 workflow failures for proof).
      # The artifact is downloadable from the Actions run page for
      # release managers to copy-paste bullets into CHANGELOG.md.
      - name: Upload CHANGELOG-UNRELEASED artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: changelog-unreleased
          path: CHANGELOG-UNRELEASED.md
          if-no-files-found: error
          retention-days: 30

      # On tag push, render the full versioned changelog as release
      # notes. Uploaded as a workflow artifact so the release workflow
      # (Q-10) can pull it down for the GitHub Release body.
      - name: Render release notes on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --verbose --current
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Upload release notes artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error
